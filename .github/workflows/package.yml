name: 🌵 Python Package

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: Tag to build
        required: false
        type: string
    outputs:
      version:
        description: The true version of the package
        value: ${{ jobs.package.outputs.version }}
      package:
        description: The package artifact name
        value: ${{ jobs.package.outputs.package }}
    secrets:
      GH_APP_KEY:
        description: GitHub App private key
        required: true

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      package: ${{ steps.check_version.outputs.package }}
    steps:

    - name: Create GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_KEY }}

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip

    - name: Install Dependencies
      run: pip install ".[build]"

    - name: Check True Version
      id: check_version
      run: |
        version=$(python -m setuptools_scm)
        package="duploctl_pipe-${version}"
        echo "Building Version: $version"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "package=$package" >> $GITHUB_OUTPUT

    - name: Run the Build
      run: python -m build

    - name: Show Files
      run: ls -l dist

    - name: Github Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.check_version.outputs.package }}
        path: dist/*.tar.gz
